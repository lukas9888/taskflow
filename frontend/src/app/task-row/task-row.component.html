<div class="row">
  @if (!isEditing) {
    <span class="row__title">{{ task.title }}</span>
    <span class="row__meta">#{{ task.id }}</span>

    @if (task.dueAt) {
    <span class="row__meta">Due: {{ task.dueAt | date:'short' }}</span>
    } 

    <button type="button" (click)="startEdit()">Edit</button>
    <button type="button" (click)="delete()">Delete</button>
  } @else {
    <input
      type="text"
      [(ngModel)]="editTitle"
      minlength="2"
      maxlength="500"
    />
    <input
      type="datetime-local"
      [(ngModel)]="editDueAt"
      [min]="minDueAt"
    />
    <button type="button" (click)="saveEdit()" [disabled]="saving">
      {{ saving ? 'Saving…' : 'Save' }}
    </button>
    <button type="button" (click)="cancelEdit()" [disabled]="saving">
      Cancel
    </button>
  }
</div>

@if (editError) {
  <p class="row__error" role="alert">{{ editError }}</p>
}
