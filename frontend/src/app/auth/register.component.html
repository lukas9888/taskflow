<section class="auth">
  <h2>Register</h2>

  @if (error) {
    <p class="auth__error" role="alert">{{ error }}</p>
  }

  <form (ngSubmit)="submit()" class="auth__form">
    <label>
      Username
      <input
        type="text"
        [(ngModel)]="username"
        name="username"
        required
        minlength="3"
        maxlength="100"
      />
    </label>

    <label>
      Email
      <input type="email" [(ngModel)]="email" name="email" required maxlength="255" />
    </label>

    <label>
      Password (min 8 chars)
      <input
        type="password"
        [(ngModel)]="password"
        name="password"
        required
        minlength="8"
      />
    </label>

    <button type="submit" [disabled]="submitting">
      {{ submitting ? 'Creating…' : 'Create account' }}
    </button>
  </form>

  <p class="auth__muted">
    Already have an account? <a routerLink="/login">Login</a>
  </p>
</section>
