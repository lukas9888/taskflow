<div class="auth-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Register</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      @if (error) {
        <p class="form-error" role="alert">{{ error }}</p>
      }

      <form (ngSubmit)="submit()" class="form-stack auth-form">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Username</mat-label>
          <input
            matInput
            type="text"
            [(ngModel)]="username"
            name="username"
            required
            minlength="3"
            maxlength="100"
            autocomplete="username"
          />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input
            matInput
            type="email"
            [(ngModel)]="email"
            name="email"
            required
            maxlength="255"
            autocomplete="email"
          />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password (min 8 chars)</mat-label>
          <input
            matInput
            type="password"
            [(ngModel)]="password"
            name="password"
            required
            minlength="8"
            autocomplete="new-password"
          />
        </mat-form-field>

        <button
          mat-flat-button
          color="primary"
          type="submit"
          class="full-width"
          [disabled]="submitting"
        >
          {{ submitting ? 'Creating…' : 'Create account' }}
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions align="end">
      <span class="auth-muted">Already have an account? <a routerLink="/login">Login</a></span>
    </mat-card-actions>
  </mat-card>
</div>
