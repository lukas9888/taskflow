<section class="auth">
  <h2>Login</h2>

  @if (error) {
    <p class="auth__error" role="alert">{{ error }}</p>
  }

  <form (ngSubmit)="submit()" class="auth__form">
    <label>
      Login (username or email)
      <input type="text" [(ngModel)]="login" name="login" required minlength="3" />
    </label>

    <label>
      Password
      <input type="password" [(ngModel)]="password" name="password" required minlength="8" />
    </label>

    <button type="submit" [disabled]="submitting">
      {{ submitting ? 'Signing in…' : 'Sign in' }}
    </button>
  </form>

  <p class="auth__muted">
    No account? <a routerLink="/register">Register</a>
  </p>
</section>
