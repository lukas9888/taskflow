<main class="shell">
  <header class="shell__header">
    <h1>TaskFlow</h1>
    <p class="shell__sub">CBS Applied Programming — minimal full-stack POC</p>
  </header>

  @if (loadError) {
    <p class="shell__error" role="alert">{{ loadError }}</p>
  }

  <app-task-form (created)="refreshTasks()" />
  <app-task-list [tasks]="tasks" (taskDeleted)="refreshTasks()" />
</main>
