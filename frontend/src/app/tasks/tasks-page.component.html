@if (loadError) {
  <mat-card class="tasks-alert" appearance="outlined">
    <mat-card-content>
      <p class="form-error" role="alert">{{ loadError }}</p>
    </mat-card-content>
  </mat-card>
}

<mat-toolbar class="tasks-toolbar">
  <span class="tasks-toolbar-title">Tasks</span>
  <span class="spacer"></span>
  <button mat-stroked-button type="button" (click)="logout()">Logout</button>
</mat-toolbar>

<app-task-form (created)="refreshTasks()" />
<app-task-list
  [tasks]="tasks"
  (taskDeleted)="refreshTasks()"
  (taskUpdated)="refreshTasks()"
/>
