<mat-card class="list-card">
  <mat-card-header>
    <mat-card-title>Your tasks</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    @if (tasks.length === 0) {
      <p class="list-empty">No tasks yet. Add one above.</p>
    } @else {
      <div class="task-stack">
        @for (t of tasks; track t.id) {
          <app-task-row
            [task]="t"
            (deleted)="onRowDeleted()"
            (updated)="onRowUpdated()"
          />
        }
      </div>
    }
  </mat-card-content>
</mat-card>
